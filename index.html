<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1Agamert | Bloxd Leaderboard</title>
    <style>
        :root {
            --bg-body: #080a10;
            --bg-card: #0c0f17;
            --primary-blue: #58a6ff;
            --text-main: #c9d1d9;
            --text-sub: #8b949e;
            --yt-red: #ff0000;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .main-container {
            background-color: var(--bg-card);
            border: 1px solid #1f2937;
            border-radius: 15px;
            width: 95%;
            max-width: 1000px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* --- New Title & Profile Section --- */
        .title-profile-area {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .profile-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #1f2937;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            transition: border-color 0.3s;
        }

        .profile-circle:hover {
            border-color: var(--yt-red);
        }

        .profile-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h2.title-text {
            margin: 0;
            font-size: 1.8rem;
            color: var(--text-main);
            letter-spacing: 0.5px;
        }

        /* --- Category Bar --- */
        .category-wrapper {
            margin-bottom: 30px;
        }

        .category-bar {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 10px 15px;
            background: #111520;
            border-radius: 50px;
            border: 1px solid #1f2937;
            scrollbar-width: thin;
        }

        .category-bar::-webkit-scrollbar {
            height: 4px;
        }
        .category-bar::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 10px;
        }

        .category-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            border-radius: 50px;
            white-space: nowrap;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.95rem;
            transition: 0.2s;
        }

        .category-item.active {
            background-color: white;
            color: black;
        }

        .category-item:not(.active):hover {
            background: #1f2937;
        }

        /* --- Combat Tiers --- */
        .tier-section {
            margin-top: 20px;
        }

        .tier-title {
            color: var(--text-sub);
            font-size: 0.95rem;
            margin-bottom: 15px;
        }

        .tier-list {
            display: flex;
            gap: 10px;
            list-style: none;
            padding: 0;
        }

        .tier-card {
            background: rgba(88, 166, 255, 0.05);
            border: 1px solid #1f2937;
            padding: 10px 18px;
            border-radius: 6px;
            color: var(--primary-blue);
            font-weight: bold;
            font-size: 0.9rem;
            text-align: center;
            min-width: 55px;
        }

        .ht5 {
            border-color: var(--yt-red);
            color: var(--yt-red);
            background: rgba(248, 81, 73, 0.05);
        }

        /* --- Subscribe Area --- */
        .subscribe-area {
            margin-top: 40px;
            text-align: center;
            border-top: 1px solid #1f2937;
            padding-top: 25px;
        }

        .sub-btn {
            background: var(--yt-red);
            color: white;
            text-decoration: none;
            padding: 14px 30px;
            border-radius: 8px;
            font-weight: bold;
            display: inline-block;
            transition: transform 0.2s, background 0.2s;
        }

        .sub-btn:hover {
            background: #cc0000;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="main-container">
        
        <div class="title-profile-area">
            <div class="profile-circle">
                <img src="image_3.png" alt="1Agamert Profile" class="profile-image">
            </div>
            <h2 class="title-text">By 1Agamert</h2>
        </div>

        <div class="category-wrapper">
            <div class="category-bar">
                <div class="category-item active">🏆 Overall</div>
                <div class="category-item">⚔️ Sword</div>
                <div class="category-item">🍲 Soup</div>
                <div class="category-item">🕸️ UHC</div>
                <div class="category-item">🛡️ Pot</div>
                <div class="category-item">🕳️ Hole</div>
                <div class="category-item">🛏️ Bedwars</div>
                <div class="category-item">🌲 Skywars</div>
                <div class="category-item">💠 E. PvP</div>
            </div>
        </div>

        <div class="tier-section">
            <div class="tier-title">Combat Tiers:</div>
            <div class="tier-list">
                <div class="tier-card">HT1</div>
                <div class="tier-card">HT2</div>
                <div class="tier-card">HT3</div>
                <div class="tier-card">HT4</div>
                <div class="tier-card ht5">HT5</div>
            </div>
        </div>

        <div class="subscribe-area">
            <a href="https://www.youtube.com/@bloxdThemYT" class="sub-btn">Subscribe to 1Agamert</a>
        </div>
    </div>

</body>
</html>
