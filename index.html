<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقييم لاعبين Bloxd.io</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .rating-card {
            background-color: #16213e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 300px;
            text-align: center;
            border: 2px solid #0f3460;
        }

        .player-name {
            font-size: 24px;
            margin-bottom: 10px;
            color: #4ecca3;
        }

        .game-mode {
            font-size: 14px;
            color: #95a5a6;
            margin-bottom: 20px;
        }

        .stars {
            font-size: 30px;
            color: #f1c40f;
            margin-bottom: 15px;
        }

        .stat-box {
            display: flex;
            justify-content: space-around;
            background: #0f3460;
            padding: 10px;
            border-radius: 10px;
        }

        .stat-item span {
            display: block;
            font-size: 12px;
            color: #bdc3c7;
        }

        .stat-item strong {
            font-size: 18px;
        }

        .btn-rate {
            margin-top: 20px;
            background-color: #e94560;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-rate:hover {
            background-color: #ff2e63;
        }
    </style>
</head>
<body>

    <div class="rating-card">
        <div class="player-name">اسم اللاعب</div>
        <div class="game-mode">نمط اللعبة: Survival</div>
        
        <div class="stars">
            ★ ★ ★ ★ ☆
        </div>

        <div class="stat-box">
            <div class="stat-item">
                <span>الانتصارات</span>
                <strong>45</strong>
            </div>
            <div class="stat-item">
                <span>المستوى</span>
                <strong>12</strong>
            </div>
        </div>

        <button class="btn-rate">إضافة تقييم</button>
    </div>

</body>
</html>
