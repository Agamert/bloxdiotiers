<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloxd Players Rating</title>
    <style>
        :root {
            --primary-bg: #0f172a;
            --card-bg: #1e293b;
            --accent-gold: #fbbf24;
            --accent-silver: #94a3b8;
            --accent-bronze: #d97706;
            --text-color: #f8fafc;
            --button-color: #3b82f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        .header-credit {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }

        h1 {
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
            border-bottom: 2px solid #334155;
            padding-bottom: 10px;
        }

        .leaderboard {
            list-style: none;
            padding: 0;
            margin-bottom: 2rem;
        }

        .player-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 10px;
            background: #334155;
            border-radius: 8px;
            transition: transform 0.2s;
        }

        .player-item:hover {
            transform: scale(1.02);
            background: #475569;
        }

        .rank-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .rank-number {
            font-weight: bold;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: #0f172a;
        }

        /* Colors for Ranks */
        .rank-1 { color: var(--accent-gold); border: 1px solid var(--accent-gold); }
        .rank-2 { color: var(--accent-silver); border: 1px solid var(--accent-silver); }
        .rank-3 { color: var(--accent-bronze); border: 1px solid var(--accent-bronze); }

        .player-name {
            font-weight: 500;
        }

        .rating-badge {
            background: #1e293b;
            padding: 4px 10px;
            border-radius: 5px;
            font-size: 0.85rem;
            font-weight: bold;
            color: #60a5fa;
            border: 1px solid #3b82f6;
        }

        .visit-btn {
            display: inline-block;
            background-color: var(--button-color);
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: bold;
            transition: background 0.3s, box-shadow 0.3s;
        }

        .visit-btn:hover {
            background-color: #2563eb;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-credit">By 1Agamert</div>
    <h1>Bloxd Player Ratings</h1>

    <div class="leaderboard">
        <div class="player-item">
            <div class="rank-info">
                <span class="rank-number rank-1">1</span>
                <span class="player-name">CyrexLIVE</span>
            </div>
            <span class="rating-badge">HT5</span>
        </div>

        <div class="player-item">
            <div class="rank-info">
                <span class="rank-number rank-2">2</span>
                <span class="player-name">bloxd.io_Maverick</span>
            </div>
            <span class="rating-badge">HT4</span>
        </div>

        <div class="player-item">
            <div class="rank-info">
                <span class="rank-number rank-3">3</span>
                <span class="player-name">bedwarsmayhem</span>
            </div>
            <span class="rating-badge">HT3</span>
        </div>

        <div class="player-item">
            <div class="rank-info">
                <span class="rank-number">4</span>
                <span class="player-name">Xp101</span>
            </div>
            <span class="rating-badge">HT2</span>
        </div>
    </div>

    <a href="https://www.youtube.com/@1Agamert" target="_blank" class="visit-btn">
        Visit @1Agamert Channel
    </a>
</div>

</body>
</html>
