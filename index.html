<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقييم لاعبين Bloxd.io</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a0b14;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* تصميم زر الـ Hole كما في الصورة */
        .hole-button {
            background-color: #1a2235;
            padding: 10px 25px;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #2d3748;
            transition: 0.3s;
            margin-bottom: 20px;
        }

        .hole-button:hover {
            background-color: #242e45;
        }

        .hole-icon {
            width: 20px;
            height: 15px;
            background: #444;
            border-radius: 50%;
            box-shadow: inset 0 2px 5px #000;
        }

        .hole-text {
            font-weight: bold;
            color: #63b3ed;
            font-size: 18px;
        }

        /* قائمة الترتيب - مخفية في البداية */
        #ranking-list {
            display: none;
            background-color: #16213e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 320px;
            border: 2px solid #e94560;
            animation: fadeIn 0.5s ease-in-out;
        }

        .rank-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #2d3748;
        }

        .rank-item:last-child { border-bottom: none; }

        .rank-number { font-weight: bold; color: #f1c40f; }
        .rank-name { color: #fff; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="hole-button" onclick="showRanking()">
        <div class="hole-icon"></div>
        <span class="hole-text">Hole</span>
    </div>

    <div id="ranking-list">
        <h3 style="text-align: center; color: #e94560;">متصدري الترتيب</h3>
        <div class="rank-item">
            <span class="rank-name">IMANUL</span>
            <span class="rank-number">#1</span>
        </div>
        <div class="rank-item">
            <span class="rank-name">NeverlessFps</span>
            <span class="rank-number">#2</span>
        </div>
        <div class="rank-item">
            <span class="rank-name">1thekinsg300</span>
            <span class="rank-number">#3</span>
        </div>
    </div>

    <script>
        function showRanking() {
            var list = document.getElementById("ranking-list");
            if (list.style.display === "block") {
                list.style.display = "none";
            } else {
                list.style.display = "block";
            }
        }
    </script>

</body>
</html>
